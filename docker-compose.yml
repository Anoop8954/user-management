version: '3.9'

services:
  api:
    build: .
    container_name: productapi

    ports:
      - "8080:8080"

    depends_on:
      - sqlserver

    environment:
      - ConnectionStrings__Default=Server=sqlserver;Database=ProductDb;User Id=usermanagement;Password=usermanagement@123;TrustServerCertificate=True;

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: sqlserver

    environment:
      SA_PASSWORD: "usermanagement@123"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"